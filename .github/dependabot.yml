version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    cooldown:
      default-days: 3
      semver-major-days: 7
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - minor
          - patch
      react-major:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - major
      radix-ui:
        patterns:
          - "@radix-ui/*"
        update-types:
          - minor
          - patch
      radix-ui-major:
        patterns:
          - "@radix-ui/*"
        update-types:
          - major
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "typescript-eslint"
          - "eslint-plugin-react-hooks"
        update-types:
          - minor
          - patch
      eslint-major:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "typescript-eslint"
          - "eslint-plugin-react-hooks"
        update-types:
          - major
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
        update-types:
          - minor
          - patch
      tailwind-major:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
        update-types:
          - major
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
        update-types:
          - minor
          - patch
      vite-major:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
        update-types:
          - major
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    cooldown:
      default-days: 3
    groups:
      github-actions:
        patterns:
          - "*"
